<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סידור משמרות - עדן</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F2;
  --surface: #fff;
  --accent: #1E3A8A; /* כחול עמוק */
  --accent-light: #E0F2FE; /* תכלת בהיר */
  --accent-text: #1e3a8a;
  --warn: #d97706;
  --warn-light: #FEF3C7;
  --warn-text: #92400e;
  --danger: #DC2626;
  --danger-light: #FEE2E2;
  --danger-text: #7f1d1d;
  --text: #1A1A1A;
  --muted: #6B6B6B;
  --border: #E5E0D8;
  --r: 12px;
  --sh: 0 2px 12px rgba(0,0,0,0.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:700;color:var(--accent)}
.tabs{display:flex;gap:3px;background:var(--bg);border-radius:9px;padding:3px}
.tab{padding:6px 14px;border:none;background:none;border-radius:7px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}

main{max-width:660px;margin:0 auto;padding:24px 16px}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:22px;margin-bottom:14px;box-shadow:var(--sh)}
.card-title{font-size:16px;font-weight:600;margin-bottom:3px}

label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px;margin-top:14px;font-weight:500}
input[type=text],textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-family:'Heebo',sans-serif;font-size:14px;outline:none}

.day-block{margin-bottom:8px}
.day-lbl{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px}
.srow{display:flex;gap:7px}
.sc{flex:1;padding:12px 5px;border:1.5px solid var(--border);border-radius:9px;text-align:center;cursor:pointer;background:var(--bg);transition:all .15s}
.sc.yes{background:#86efac;border-color:#166534;color:#064e3b}
.sc.maybe{background:#fef08a;border-color:#854d0e;color:#713f12}
.sc.no{background:#fca5a5;border-color:#991b1b;color:#7f1d1d}

.btn{padding:12px;border-radius:9px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:600;cursor:pointer;width:100%;border:none;margin-top:18px}
.btn-green{background:var(--accent);color:#fff}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:#111;color:#fff;padding:11px 22px;border-radius:99px;transition:transform .3s;z-index:999}
#toast.show{transform:translateX(-50%) translateY(0)}

.sub-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px}
.sched-row{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sched-select{flex:1;padding:8px;border-radius:7px;border:1px solid var(--border)}

.pub-row{border-radius:9px;padding:11px;margin-bottom:5px;display:flex;justify-content:space-between;border:1px solid var(--border)}
.pub-row.yes{background:#dcfce7}.pub-row.maybe{background:#fef9c3}.pub-row.no{background:#fee2e2}
[hidden]{display:none!important}
</style>
</head>
<body>

<header>
  <div class="logo">סידור משמרות <span>/ עדן</span></div>
  <div class="tabs" id="tab-bar" hidden>
    <button class="tab" onclick="showTab('team')">טופס הגשה</button>
    <button class="tab" onclick="showTab('subs')">הגשות</button>
    <button class="tab active" onclick="showTab('build')">בניית סידור</button>
  </div>
</header>

<div id="toast"></div>

<main>
<div id="tab-team">
  <div id="pub-banner" class="card" style="background:var(--accent-light); border-color:var(--accent); font-weight:600" hidden>
    ✅ הסידור לשבוע הקרוב פורסם! (ראה למטה)
  </div>

  <div class="card">
    <div class="card-title">הגשת זמינות</div>
    <label>שם מלא</label>
    <input type="text" id="emp-name" placeholder="הכנס שם...">
    
    <label style="margin-top:20px">לחץ על משמרת לשינוי סטטוס:</label>
    <div id="shifts-builder"></div>

    <label>הערות</label>
    <textarea id="emp-notes"></textarea>
    <button class="btn btn-green" id="submit-btn" onclick="submitForm()">אישור ושליחה</button>
  </div>

  <div id="team-schedule" hidden>
    <div class="card">
      <div class="card-title">📋 הסידור הסופי</div>
      <div id="team-pub-grid"></div>
    </div>
  </div>
</div>

<div id="tab-subs" hidden>
  <div class="card-title">הגשות שהתקבלו</div>
  <div id="subs-list"></div>
</div>

<div id="tab-build" hidden>
  <div class="card-title">בניית סידור סופי</div>
  <div id="build-area"></div>
</div>
</main>

<script>
// החיבור שלך ל-Supabase
const SUPABASE_URL = 'https://bkqggppgusfvufyfmndv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_gT4JQDZp04HRGqpQoT7NOQ_i5-wNCB9';

const DAYS = [{id:'sun',label:'ראשון'},{id:'mon',label:'שני'},{id:'tue',label:'שלישי'},{id:'wed',label:'רביעי'},{id:'thu',label:'חמישי'},{id:'fri',label:'שישי'}];
const SHIFTS = [{id:'m',label:'בוקר'},{id:'e',label:'ערב'}];
let avail = {};

window.addEventListener('DOMContentLoaded', () => {
  buildGrid();
  if (window.location.hash === '#manager') {
    document.getElementById('tab-bar').hidden = false;
    showTab('build');
  }
  loadPublished();
});

function buildGrid() {
  let html = '';
  DAYS.forEach(d => {
    html += `<div class="day-block"><div class="day-lbl">${d.label}</div><div class="srow">`;
    SHIFTS.forEach(s => {
      const k = `${d.id}_${s.id}`;
      avail[k] = 'none';
      html += `<div class="sc none" id="sc-${k}" onclick="toggle('${k}')"><b>${s.label}</b></div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('shifts-builder').innerHTML = html;
}

function toggle(k) {
  const states = ['none','yes','maybe','no'];
  avail[k] = states[(states.indexOf(avail[k])+1)%states.length];
  document.getElementById('sc-'+k).className = 'sc '+avail[k];
}

function showTab(t) {
  ['team','subs','build'].forEach(x => document.getElementById('tab-'+x).hidden = (x!==t));
  if(t==='subs') loadSubs();
  if(t==='build') loadBuild();
}

async function submitForm() {
  const name = document.getElementById('emp-name').value;
  if(!name) return alert('נא להכניס שם');
  
  const res = await fetch(`${SUPABASE_URL}/rest/v1/shifts`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, availability: avail, submitted_at: new Date() })
  });
  if(res.ok) { alert('נשלח בהצלחה!'); location.reload(); }
}

async function loadPublished() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/schedule?select=*`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  const data = await r.json();
  if(data.length > 0) {
    document.getElementById('team-schedule').hidden = false;
    document.getElementById('pub-banner').hidden = false;
    let html = '';
    data.forEach(s => {
      html += `<div class="pub-row ${s.avail_status}">
        <span>${s.day_id} - ${s.shift_id}</span>
        <b>${s.person_name}</b>
      </div>`;
    });
    document.getElementById('team-pub-grid').innerHTML = html;
  }
}

async function loadSubs() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/shifts?select=*`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  const data = await r.json();
  let html = '';
  data.forEach(sub => {
    html += `<div class="sub-card"><b>${sub.name}</b><br><small>${sub.notes || ''}</small></div>`;
  });
  document.getElementById('subs-list').innerHTML = html;
}

async function loadBuild() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/shifts?select=*`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  const subs = await r.json();
  const names = [...new Set(subs.map(s => s.name))];
  
  let html = '';
  DAYS.forEach(d => {
    SHIFTS.forEach(s => {
      const k = `${d.id}_${s.id}`;
      html += `<div class="sched-row">
        <span>${d.label} ${s.label}</span>
        <select class="sched-select" id="sel-${k}">
          <option value="">-- בחר עובד --</option>
          ${names.map(n => `<option value="${n}">${n}</option>`).join('')}
        </select>
      </div>`;
    });
  });
  html += `<button class="btn btn-green" onclick="publish()">פרסם סידור סופי</button>`;
  document.getElementById('build-area').innerHTML = html;
}

async function publish() {
  const rows = [];
  DAYS.forEach(d => SHIFTS.forEach(s => {
    const k = `${d.id}_${s.id}`;
    const name = document.getElementById('sel-'+k).value;
    if(name) rows.push({ day_id: d.label, shift_id: s.label, person_name: name, published_at: new Date() });
  }));

  await fetch(`${SUPABASE_URL}/rest/v1/schedule`, { method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
  const res = await fetch(`${SUPABASE_URL}/rest/v1/schedule`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(rows)
  });
  if(res.ok) alert('הסידור פורסם בהצלחה!');
}
</script>
</body>
</html>
